- name: write Vault policies
  command: vault policy write {{ item[:-5] | split('/') | last }} {{item}}
  with_fileglob:
    - "{{policy_dir}}/*"

- name: enable Vault Approle authentication
  command: vault auth enable approle

- name: write Vault approles
  command: vault write auth/approle/role/{{ item[:-5] | split('/') | last }} @{{item}}
  with_fileglob:
    - "{{approles_dir}}/*"
