- name: create Vault admin user for MariaDB
  command: mysql -u {{mariadb_root_user}} -p{{mariadb_root_pass}} -e "CREATE USER '{{vault_db_user}}'@'vault-system' IDENTIFIED BY '{{vault_db_pass}}';"

- name: grant privileges for Vault admin user
  command: mysql -u {{mariadb_root_user}} -p{{mariadb_root_pass}} -e "GRANT ALL PRIVILEGES ON *.* TO '{{vault_db_user}}'@'vault-system' WITH GRANT OPTION;"

- name: flush MariaDB privileges
  command: mysql -u {{mariadb_root_user}} -p{{mariadb_root_pass}} -e "FLUSH PRIVILEGES;"
