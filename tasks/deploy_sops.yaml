- name: download SOPS binary
  get_url:
    url: https://github.com/getsops/sops/releases/download/v3.12.2/sops-v3.12.2.linux.amd64
    dest: /usr/local/bin/sops
    mode: '0755'

- name: add environment variables for SOPS
  lineinfile:
    path: /etc/environment
    line: "{{item}}"
    state: present
  loop:
    - "host    all             all                     server          scram-sha-256"
    - "host    all             vault-admin             vault-system    scram-sha-256"

- name: activate environment variables
  shell: source /etc/environment
  become: false
